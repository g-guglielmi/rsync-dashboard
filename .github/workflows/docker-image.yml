# Builds the Docker image and publishes it to GitHub Container Registry (ghcr.io).
#
# - Push to main           -> rebuilds and publishes the `:latest` tag.
# - Push a tag like v1.2.0 -> ALSO publishes `:v1.2.0`, `:v1.2`, `:v1`, and
#   creates a GitHub Release with auto-generated notes (what changed since
#   the last tag).
#
# Nothing to configure: GITHUB_TOKEN is provided automatically by GitHub
# Actions with permission to publish packages and create releases in your
# own repo.

name: Build and publish image

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # lets the workflow create a GitHub Release
      packages: write   # lets it publish to ghcr.io
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Work out image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/rsync-dashboard
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping creation."
          else
            gh release create "${{ github.ref_name }}" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
